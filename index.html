<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR Sound Therapy — Tinnitus Relief</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
    }
    canvas { display: block; }
    #overlay {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(10, 10, 15, 0.85);
      transition: opacity 0.6s ease;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    #overlay h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; color: #fff; }
    #overlay p {
      font-size: 0.85rem; line-height: 1.6; color: #999;
      max-width: 440px; text-align: center; margin-bottom: 1.2rem;
    }
    .btn {
      padding: 14px 36px; font-size: 1rem; font-weight: 600;
      border: none; border-radius: 8px; cursor: pointer;
      transition: background 0.2s; margin: 4px;
    }
    #start-btn { background: #4a6cf7; color: #fff; }
    #start-btn:hover { background: #3b5de7; }
    #enter-vr-btn { background: #2a2a3e; color: #aaa; display: none; }
    #enter-vr-btn:hover { background: #3a3a4e; }
    #hud {
      position: fixed; bottom: 16px; left: 16px; z-index: 5;
      font-size: 0.8rem; color: rgba(150, 160, 255, 0.7);
      font-family: 'SF Mono', 'Fira Code', monospace;
      pointer-events: none; text-shadow: 0 0 8px rgba(74, 108, 247, 0.3);
    }
    #hud .label { color: rgba(150, 160, 255, 0.4); }
  </style>
</head>
<body>

<div id="overlay">
  <h1>VR Sound Therapy</h1>
  <p>
    Move the glowing sphere to explore sound.<br>
    Height = frequency, Left-Right = stereo panning.<br><br>
    <strong>VR Controls:</strong><br>
    Trigger = push sphere away &nbsp;|&nbsp; Grip = pull sphere back<br>
    A/X button = reset sphere to hand
  </p>
  <div>
    <button class="btn" id="start-btn">Start (Desktop)</button>
    <button class="btn" id="enter-vr-btn">Enter VR</button>
  </div>
</div>
<div id="hud"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ── Config ──────────────────────────────────────
const CONFIG = {
  minFreq: 20,
  maxFreq: 20000,
  smoothingTime: 0.06,
  defaultGain: 0.35,
  minY: 0.0,
  maxY: 4.0,
  panRangeX: 3.0,
  pushSpeed: 3.0,    // m/s — how fast trigger pushes sphere away
  pullSpeed: 3.0,    // m/s — how fast grip pulls sphere back
  sphereRadius: 0.08,
  sphereColor: 0x4a6cf7,
  sphereEmissive: 0x4a6cf7,
  sphereEmissiveIntensity: 0.8,
};

// ── State ───────────────────────────────────────
let renderer, scene, camera;
let sphere, sphereGlow, sphereLight;
let audioCtx, oscillator, leftGain, rightGain, masterGain;
let audioStarted = false;
let desktopDragging = false;
let lastRenderTime = 0;

// Laser line from controller to sphere
let laserLine;
const laserPoints = [new THREE.Vector3(), new THREE.Vector3()];

const overlayEl = document.getElementById('overlay');
const hudEl = document.getElementById('hud');

// ── Audio ───────────────────────────────────────
function initAudio() {
  if (audioStarted) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  oscillator = audioCtx.createOscillator();
  oscillator.type = 'sine';
  oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);

  masterGain = audioCtx.createGain();
  masterGain.gain.setValueAtTime(0, audioCtx.currentTime);

  leftGain = audioCtx.createGain();
  leftGain.gain.setValueAtTime(1, audioCtx.currentTime);
  rightGain = audioCtx.createGain();
  rightGain.gain.setValueAtTime(1, audioCtx.currentTime);

  const merger = audioCtx.createChannelMerger(2);
  oscillator.connect(masterGain);
  masterGain.connect(leftGain);
  masterGain.connect(rightGain);
  leftGain.connect(merger, 0, 0);
  rightGain.connect(merger, 0, 1);
  merger.connect(audioCtx.destination);
  oscillator.start();

  masterGain.gain.linearRampToValueAtTime(CONFIG.defaultGain, audioCtx.currentTime + 0.3);
  audioStarted = true;
}

function resumeAudio() {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function mapYToFrequency(y) {
  const t = Math.max(0, Math.min(1, (y - CONFIG.minY) / (CONFIG.maxY - CONFIG.minY)));
  return CONFIG.minFreq * Math.pow(CONFIG.maxFreq / CONFIG.minFreq, t);
}

function mapXToLR(x) {
  const t = Math.max(-1, Math.min(1, x / CONFIG.panRangeX));
  return {
    left:  Math.max(0, Math.min(1, 1 - t)),
    right: Math.max(0, Math.min(1, 1 + t)),
  };
}

function updateAudio(position) {
  if (!audioCtx || !audioStarted) return;
  resumeAudio();
  const now = audioCtx.currentTime;
  const freq = mapYToFrequency(position.y);
  const lr = mapXToLR(position.x);

  oscillator.frequency.cancelScheduledValues(now);
  oscillator.frequency.setValueAtTime(oscillator.frequency.value, now);
  oscillator.frequency.linearRampToValueAtTime(freq, now + CONFIG.smoothingTime);

  leftGain.gain.cancelScheduledValues(now);
  leftGain.gain.setValueAtTime(leftGain.gain.value, now);
  leftGain.gain.linearRampToValueAtTime(lr.left, now + CONFIG.smoothingTime);

  rightGain.gain.cancelScheduledValues(now);
  rightGain.gain.setValueAtTime(rightGain.gain.value, now);
  rightGain.gain.linearRampToValueAtTime(lr.right, now + CONFIG.smoothingTime);
}

// ── Scene ───────────────────────────────────────
function initScene() {
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  renderer.setClearColor(0x0a0a12);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  document.body.prepend(renderer.domElement);

  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0a0a12, 0.1);

  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 50);
  camera.position.set(0, 1.6, 2.5);
  camera.lookAt(0, 1.2, 0);

  scene.add(new THREE.AmbientLight(0x222244, 0.6));
  const topLight = new THREE.PointLight(0x4466aa, 1.5, 15);
  topLight.position.set(0, 3, 0);
  scene.add(topLight);

  const grid = new THREE.GridHelper(12, 24, 0x1a1a2e, 0x1a1a2e);
  grid.material.opacity = 0.4;
  grid.material.transparent = true;
  scene.add(grid);

  // Sphere
  const sphereGeom = new THREE.SphereGeometry(CONFIG.sphereRadius, 32, 32);
  sphere = new THREE.Mesh(sphereGeom, new THREE.MeshStandardMaterial({
    color: CONFIG.sphereColor,
    emissive: CONFIG.sphereEmissive,
    emissiveIntensity: CONFIG.sphereEmissiveIntensity,
    metalness: 0.3,
    roughness: 0.2,
  }));
  sphere.position.set(0, 1.2, -0.5);
  scene.add(sphere);

  // Glow
  sphereGlow = new THREE.Mesh(
    new THREE.SphereGeometry(CONFIG.sphereRadius * 3, 32, 32),
    new THREE.MeshBasicMaterial({ color: CONFIG.sphereColor, transparent: true, opacity: 0.06, side: THREE.BackSide })
  );
  sphere.add(sphereGlow);
  sphereLight = new THREE.PointLight(0x4a6cf7, 1.5, 3);
  sphere.add(sphereLight);

  // Laser line (controller → sphere)
  const laserGeom = new THREE.BufferGeometry().setFromPoints(laserPoints);
  const laserMat = new THREE.LineBasicMaterial({ color: 0x4a6cf7, transparent: true, opacity: 0.4 });
  laserLine = new THREE.Line(laserGeom, laserMat);
  laserLine.visible = false;
  scene.add(laserLine);
}

// ── Controllers ─────────────────────────────────
// No event listeners needed — we poll gamepad buttons every frame
function initControllers() {
  for (let i = 0; i < 2; i++) {
    const controller = renderer.xr.getController(i);
    scene.add(controller);
    // Controller tip
    const tip = new THREE.Mesh(
      new THREE.SphereGeometry(0.015, 16, 16),
      new THREE.MeshBasicMaterial({ color: 0x8888aa, transparent: true, opacity: 0.5 })
    );
    controller.add(tip);
  }
}

// ── Button Polling ──────────────────────────────
// Quest Touch buttons:
//   buttons[0] = trigger (index finger)
//   buttons[1] = grip/squeeze (middle finger)
//   buttons[3] = thumbstick press
//   buttons[4] = A or X
//   buttons[5] = B or Y
//
// We use:
//   Trigger (0) = push sphere away along controller direction
//   Grip    (1) = pull sphere toward controller
//   A/X     (4) = reset sphere to controller position

function pollControllerButtons(dt) {
  const session = renderer.xr.getSession();
  if (!session) return;

  let anyActive = false;

  for (const source of session.inputSources) {
    if (!source.gamepad || !source.gripSpace) continue;
    const btns = source.gamepad.buttons;

    // Get controller world position and direction
    const controller = getControllerForSource(source);
    if (!controller) continue;

    const controllerPos = new THREE.Vector3();
    controller.getWorldPosition(controllerPos);

    const controllerDir = new THREE.Vector3(0, 0, -1);
    controller.getWorldQuaternion(_quat);
    controllerDir.applyQuaternion(_quat).normalize();

    // Trigger (button 0) — push sphere away
    if (btns[0] && btns[0].pressed) {
      initAudio();
      anyActive = true;
      const pushAmount = CONFIG.pushSpeed * dt * btns[0].value; // analog trigger
      sphere.position.addScaledVector(controllerDir, pushAmount);
    }

    // Grip (button 1) — pull sphere toward controller
    if (btns[1] && btns[1].pressed) {
      initAudio();
      anyActive = true;
      // Direction from sphere toward controller
      const pullDir = new THREE.Vector3().subVectors(controllerPos, sphere.position).normalize();
      const dist = controllerPos.distanceTo(sphere.position);
      // Don't overshoot — slow down when close
      const pullAmount = Math.min(CONFIG.pullSpeed * dt, dist - 0.05);
      if (pullAmount > 0) {
        sphere.position.addScaledVector(pullDir, pullAmount);
      }
    }

    // A/X button (button 4) — reset sphere to hand position
    if (btns[4] && btns[4].pressed) {
      initAudio();
      anyActive = true;
      // Snap sphere to 0.3m in front of controller
      sphere.position.copy(controllerPos).addScaledVector(controllerDir, 0.3);
    }

    // Update laser line from controller to sphere
    if (anyActive || btns[0]?.value > 0.1 || btns[1]?.value > 0.1) {
      laserLine.visible = true;
      const positions = laserLine.geometry.attributes.position;
      positions.setXYZ(0, controllerPos.x, controllerPos.y, controllerPos.z);
      positions.setXYZ(1, sphere.position.x, sphere.position.y, sphere.position.z);
      positions.needsUpdate = true;

      // Laser brightness based on distance
      const dist = controllerPos.distanceTo(sphere.position);
      laserLine.material.opacity = Math.max(0.1, 0.5 - dist * 0.05);
    }
  }

  if (!anyActive) {
    laserLine.visible = false;
  }

  // Visual feedback: glow when buttons active
  if (anyActive) {
    sphere.material.emissiveIntensity = 1.3;
    sphereGlow.material.opacity = 0.12;
    sphereLight.intensity = 2.5;
  } else {
    sphere.material.emissiveIntensity = CONFIG.sphereEmissiveIntensity;
    sphereLight.intensity = 1.5;
  }
}

// Helper: map XRInputSource to Three.js controller object
const _quat = new THREE.Quaternion();
function getControllerForSource(source) {
  const session = renderer.xr.getSession();
  if (!session) return null;
  const sources = session.inputSources;
  for (let i = 0; i < sources.length; i++) {
    if (sources[i] === source) {
      return renderer.xr.getController(i);
    }
  }
  return null;
}

// ── Desktop Controls ────────────────────────────
function initDesktopControls() {
  document.addEventListener('pointerdown', (e) => {
    if (e.target.tagName === 'BUTTON') return;
    desktopDragging = true;
    moveSphereFromMouse(e);
  });
  document.addEventListener('pointermove', (e) => {
    if (!desktopDragging) return;
    moveSphereFromMouse(e);
  });
  document.addEventListener('pointerup', () => { desktopDragging = false; });
}

function moveSphereFromMouse(e) {
  sphere.position.x = ((e.clientX / window.innerWidth) * 2 - 1) * CONFIG.panRangeX;
  sphere.position.y = Math.max(CONFIG.minY, Math.min(CONFIG.maxY,
    (1 - e.clientY / window.innerHeight) * CONFIG.maxY));
  sphere.position.z = -0.5;
}

// ── Render Loop ─────────────────────────────────
function render(time) {
  const dt = (time - lastRenderTime) / 1000;
  lastRenderTime = time;

  // VR: poll buttons every frame
  if (renderer.xr.isPresenting && dt > 0 && dt < 0.5) {
    pollControllerButtons(dt);
  }

  // Glow pulse (when idle)
  if (!desktopDragging && !renderer.xr.isPresenting) {
    sphereGlow.material.opacity = 0.05 + Math.sin(time * 0.002) * 0.02;
  }

  if (audioStarted) updateAudio(sphere.position);

  // HUD
  if (!renderer.xr.isPresenting) {
    const freq = mapYToFrequency(sphere.position.y);
    const lr = mapXToLR(sphere.position.x);
    hudEl.innerHTML =
      `<span class="label">freq</span> ${freq.toFixed(1)} Hz &nbsp; ` +
      `<span class="label">L</span> ${(lr.left * 100).toFixed(0)}% &nbsp;` +
      `<span class="label">R</span> ${(lr.right * 100).toFixed(0)}% &nbsp; ` +
      `<span class="label">y</span> ${sphere.position.y.toFixed(2)}m`;
  }

  renderer.render(scene, camera);
}

// ── Start / VR ──────────────────────────────────
function startDesktop() {
  overlayEl.classList.add('hidden');
  initAudio();
  sphere.material.emissiveIntensity = 1.5;
  sphereLight.intensity = 3;
  setTimeout(() => {
    sphere.material.emissiveIntensity = CONFIG.sphereEmissiveIntensity;
    sphereLight.intensity = 1.5;
  }, 600);
}

async function startVR() {
  try {
    initAudio();
    const session = await navigator.xr.requestSession('immersive-vr', {
      optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking'],
    });
    renderer.xr.setSession(session);
    overlayEl.classList.add('hidden');
    session.addEventListener('end', () => overlayEl.classList.remove('hidden'));
  } catch (err) {
    console.error('VR session failed:', err);
    alert('VR을 시작할 수 없습니다: ' + err.message);
  }
}

async function checkVR() {
  if (navigator.xr) {
    const ok = await navigator.xr.isSessionSupported('immersive-vr').catch(() => false);
    if (ok) document.getElementById('enter-vr-btn').style.display = 'inline-block';
  }
}

// ── Init ────────────────────────────────────────
initScene();
initControllers();
initDesktopControls();
renderer.setAnimationLoop(render);
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
document.getElementById('start-btn').addEventListener('click', startDesktop);
document.getElementById('enter-vr-btn').addEventListener('click', startVR);
checkVR();
</script>
</body>
</html>
