<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR Sound Therapy — Tinnitus Relief</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; color: #e0e0e0; font-family: system-ui, sans-serif; overflow: hidden; height: 100vh; }
    canvas { display: block; }
    #overlay {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(10,10,15,0.85); transition: opacity 0.6s;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    #overlay h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #fff; }
    #overlay p { font-size: 0.85rem; line-height: 1.6; color: #999; max-width: 440px; text-align: center; margin-bottom: 1.2rem; }
    .btn { padding: 14px 36px; font-size: 1rem; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; margin: 4px; }
    #start-btn { background: #4a6cf7; color: #fff; }
    #enter-vr-btn { background: #2a2a3e; color: #aaa; display: none; }
    #hud { position: fixed; bottom: 16px; left: 16px; z-index: 5; font-size: 0.8rem; color: rgba(150,160,255,0.7); font-family: monospace; pointer-events: none; }
    #hud .label { color: rgba(150,160,255,0.4); }
  </style>
</head>
<body>
<div id="overlay">
  <h1>VR Sound Therapy</h1>
  <p>
    Height = frequency (5kHz–20kHz), Left-Right = stereo panning.<br><br>
    <strong>VR:</strong> Point controller at the handle, pull trigger to grab, move arm to control.<br>
    <strong>Desktop:</strong> Click and drag to move the sphere.
  </p>
  <div>
    <button class="btn" id="start-btn">Start (Desktop)</button>
    <button class="btn" id="enter-vr-btn">Enter VR</button>
  </div>
</div>
<div id="hud"></div>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';

// ── Config ─────────────────────────────────
const CONFIG = {
  minFreq: 5000, maxFreq: 20000, smoothingTime: 0.06, defaultGain: 0.35,
  minY: 0.0, maxY: 4.0, panRangeX: 3.0,
  sphereRadius: 0.08,
  handleRadius: 0.06,      // grab handle size
  handleColor: 0xff6644,
  sphereColor: 0x4a6cf7,
};

// ── State ──────────────────────────────────
let renderer, scene, camera;
let soundSphere, sphereGlow, sphereLight;
let handle, handleGlow; // grabbable handle in VR
let rayLine;            // controller ray visualization
let audioCtx, oscillator, leftGain, rightGain, masterGain;
let audioStarted = false;
let desktopDragging = false;

// VR grab state
const grab = { active: false, controllerIndex: -1 };
const raycaster = new THREE.Raycaster();
const tempMatrix = new THREE.Matrix4();

// ── Audio ──────────────────────────────────
function initAudio() {
  if (audioStarted) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  oscillator = audioCtx.createOscillator();
  oscillator.type = 'sine';
  oscillator.frequency.setValueAtTime(5000, audioCtx.currentTime);
  masterGain = audioCtx.createGain();
  masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
  leftGain = audioCtx.createGain();
  rightGain = audioCtx.createGain();
  const merger = audioCtx.createChannelMerger(2);
  oscillator.connect(masterGain);
  masterGain.connect(leftGain);
  masterGain.connect(rightGain);
  leftGain.connect(merger, 0, 0);
  rightGain.connect(merger, 0, 1);
  merger.connect(audioCtx.destination);
  oscillator.start();
  masterGain.gain.linearRampToValueAtTime(CONFIG.defaultGain, audioCtx.currentTime + 0.3);
  audioStarted = true;
}

function resumeAudio() { if (audioCtx?.state === 'suspended') audioCtx.resume(); }

function mapYToFreq(y) {
  const t = Math.max(0, Math.min(1, (y - CONFIG.minY) / (CONFIG.maxY - CONFIG.minY)));
  return CONFIG.minFreq * Math.pow(CONFIG.maxFreq / CONFIG.minFreq, t);
}
function mapXToLR(x) {
  const t = Math.max(-1, Math.min(1, x / CONFIG.panRangeX));
  return { left: Math.max(0, 1 - t), right: Math.max(0, 1 + t) };
}
function updateAudio(pos) {
  if (!audioCtx || !audioStarted) return;
  resumeAudio();
  const now = audioCtx.currentTime;
  const freq = mapYToFreq(pos.y);
  const lr = mapXToLR(pos.x);
  oscillator.frequency.cancelScheduledValues(now);
  oscillator.frequency.setValueAtTime(oscillator.frequency.value, now);
  oscillator.frequency.linearRampToValueAtTime(freq, now + CONFIG.smoothingTime);
  leftGain.gain.cancelScheduledValues(now);
  leftGain.gain.setValueAtTime(leftGain.gain.value, now);
  leftGain.gain.linearRampToValueAtTime(lr.left, now + CONFIG.smoothingTime);
  rightGain.gain.cancelScheduledValues(now);
  rightGain.gain.setValueAtTime(rightGain.gain.value, now);
  rightGain.gain.linearRampToValueAtTime(lr.right, now + CONFIG.smoothingTime);
}

// ── Scene ──────────────────────────────────
function initScene() {
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  renderer.setClearColor(0x0a0a12);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  document.body.prepend(renderer.domElement);

  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0a0a12, 0.08);
  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 50);
  camera.position.set(0, 1.6, 2.5);
  camera.lookAt(0, 1.2, 0);

  scene.add(new THREE.AmbientLight(0x222244, 0.6));
  const topLight = new THREE.PointLight(0x4466aa, 1.5, 15);
  topLight.position.set(0, 3, 0);
  scene.add(topLight);

  // Floor grid
  const grid = new THREE.GridHelper(12, 24, 0x1a1a2e, 0x1a1a2e);
  grid.material.opacity = 0.4; grid.material.transparent = true;
  scene.add(grid);

  // ── Sound sphere (the audio source, follows the handle) ──
  soundSphere = new THREE.Mesh(
    new THREE.SphereGeometry(CONFIG.sphereRadius, 32, 32),
    new THREE.MeshStandardMaterial({
      color: CONFIG.sphereColor, emissive: CONFIG.sphereColor,
      emissiveIntensity: 0.8, metalness: 0.3, roughness: 0.2,
    })
  );
  soundSphere.position.set(0, 1.2, -0.8);
  scene.add(soundSphere);

  sphereGlow = new THREE.Mesh(
    new THREE.SphereGeometry(CONFIG.sphereRadius * 3, 32, 32),
    new THREE.MeshBasicMaterial({ color: CONFIG.sphereColor, transparent: true, opacity: 0.06, side: THREE.BackSide })
  );
  soundSphere.add(sphereGlow);
  sphereLight = new THREE.PointLight(0x4a6cf7, 1.5, 3);
  soundSphere.add(sphereLight);

  // ── Grabbable handle (VR joystick knob) ──
  // This is a bright orange sphere near the user, easy to point at and grab
  handle = new THREE.Mesh(
    new THREE.SphereGeometry(CONFIG.handleRadius, 24, 24),
    new THREE.MeshStandardMaterial({
      color: CONFIG.handleColor, emissive: CONFIG.handleColor,
      emissiveIntensity: 0.6, metalness: 0.2, roughness: 0.3,
    })
  );
  // Position: right in front of user at waist height, easy to reach
  handle.position.copy(soundSphere.position);
  scene.add(handle);

  handleGlow = new THREE.Mesh(
    new THREE.SphereGeometry(CONFIG.handleRadius * 2.5, 24, 24),
    new THREE.MeshBasicMaterial({ color: CONFIG.handleColor, transparent: true, opacity: 0.08, side: THREE.BackSide })
  );
  handle.add(handleGlow);

  // Small connecting line between handle and sphere
  // (they start at same position, but handle can be grabbed and moved)

  // ── Controller ray line ──
  const rayGeom = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, -5)
  ]);
  rayLine = new THREE.Line(rayGeom, new THREE.LineBasicMaterial({
    color: 0xff6644, transparent: true, opacity: 0.0
  }));
  scene.add(rayLine);
}

// ── VR Controllers + Ray Grab ──────────────
function initControllers() {
  for (let i = 0; i < 2; i++) {
    const controller = renderer.xr.getController(i);
    scene.add(controller);

    // Trigger = selectstart/selectend (this definitely works on Quest)
    controller.addEventListener('selectstart', () => onSelectStart(i));
    controller.addEventListener('selectend', () => onSelectEnd(i));
    // Also try squeeze
    controller.addEventListener('squeezestart', () => onSelectStart(i));
    controller.addEventListener('squeezeend', () => onSelectEnd(i));
  }
}

function onSelectStart(index) {
  initAudio();
  // Check if controller ray hits the handle
  const controller = renderer.xr.getController(index);
  tempMatrix.identity().extractRotation(controller.matrixWorld);
  raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
  raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

  const hits = raycaster.intersectObject(handle, false);
  if (hits.length > 0) {
    grab.active = true;
    grab.controllerIndex = index;
    handle.material.emissiveIntensity = 1.2;
    handleGlow.material.opacity = 0.2;
  }
}

function onSelectEnd(index) {
  if (grab.active && grab.controllerIndex === index) {
    grab.active = false;
    grab.controllerIndex = -1;
    handle.material.emissiveIntensity = 0.6;
    handleGlow.material.opacity = 0.08;
  }
}

// ── Render ─────────────────────────────────
function render(time) {
  // VR: update ray and handle position
  if (renderer.xr.isPresenting) {
    updateVR();
  }

  // Glow pulse
  if (!grab.active && !desktopDragging) {
    const p = 0.05 + Math.sin(time * 0.002) * 0.02;
    sphereGlow.material.opacity = p;
    handleGlow.material.opacity = 0.06 + Math.sin(time * 0.003) * 0.02;
  }

  if (audioStarted) updateAudio(soundSphere.position);

  // Desktop HUD
  if (!renderer.xr.isPresenting) {
    const freq = mapYToFreq(soundSphere.position.y);
    const lr = mapXToLR(soundSphere.position.x);
    document.getElementById('hud').innerHTML =
      `<span class="label">freq</span> ${freq.toFixed(0)} Hz &nbsp; ` +
      `<span class="label">L</span> ${(lr.left * 100).toFixed(0)}% &nbsp;` +
      `<span class="label">R</span> ${(lr.right * 100).toFixed(0)}%`;
  }

  renderer.render(scene, camera);
}

function updateVR() {
  // Show ray from each controller
  for (let i = 0; i < 2; i++) {
    const controller = renderer.xr.getController(i);

    if (i === 0 || grab.controllerIndex === i) {
      // Update ray visualization for primary controller or grabbing controller
      tempMatrix.identity().extractRotation(controller.matrixWorld);
      const origin = new THREE.Vector3().setFromMatrixPosition(controller.matrixWorld);
      const dir = new THREE.Vector3(0, 0, -1).applyMatrix4(tempMatrix);

      // Show ray
      const end = origin.clone().addScaledVector(dir, 5);
      rayLine.geometry.setFromPoints([origin, end]);
      rayLine.geometry.attributes.position.needsUpdate = true;

      // Check if ray hits handle (for visual hover feedback)
      raycaster.ray.origin.copy(origin);
      raycaster.ray.direction.copy(dir);
      const hits = raycaster.intersectObject(handle, false);

      if (hits.length > 0 || (grab.active && grab.controllerIndex === i)) {
        rayLine.material.opacity = 0.5;
        rayLine.material.color.set(0xff6644);
      } else {
        rayLine.material.opacity = 0.15;
        rayLine.material.color.set(0x6666aa);
      }

      // If grabbing, move handle to where ray hits a virtual plane
      if (grab.active && grab.controllerIndex === i) {
        // Project ray onto a plane at the handle's Z depth
        // This lets the user move the handle in X/Y by moving the controller
        const planeZ = handle.position.z;
        if (Math.abs(dir.z) > 0.001) {
          const t = (planeZ - origin.z) / dir.z;
          if (t > 0 && t < 20) {
            const hitPoint = origin.clone().addScaledVector(dir, t);
            handle.position.x = hitPoint.x;
            handle.position.y = Math.max(CONFIG.minY, hitPoint.y);
          }
        }

        // Sound sphere follows handle
        soundSphere.position.copy(handle.position);
      }
    }
  }
}

// ── Desktop ────────────────────────────────
function initDesktopControls() {
  document.addEventListener('pointerdown', (e) => {
    if (e.target.tagName === 'BUTTON') return;
    desktopDragging = true;
    moveSphereFromMouse(e);
  });
  document.addEventListener('pointermove', (e) => { if (desktopDragging) moveSphereFromMouse(e); });
  document.addEventListener('pointerup', () => { desktopDragging = false; });
}
function moveSphereFromMouse(e) {
  const x = ((e.clientX / window.innerWidth) * 2 - 1) * CONFIG.panRangeX;
  const y = Math.max(CONFIG.minY, Math.min(CONFIG.maxY, (1 - e.clientY / window.innerHeight) * CONFIG.maxY));
  soundSphere.position.set(x, y, soundSphere.position.z);
  handle.position.copy(soundSphere.position);
}

// ── Start / VR ─────────────────────────────
function startDesktop() {
  document.getElementById('overlay').classList.add('hidden');
  initAudio();
}
async function startVR() {
  try {
    initAudio();
    const session = await navigator.xr.requestSession('immersive-vr', {
      optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking'],
    });
    renderer.xr.setSession(session);
    document.getElementById('overlay').classList.add('hidden');
    session.addEventListener('end', () => document.getElementById('overlay').classList.remove('hidden'));
  } catch (err) {
    alert('VR 시작 실패: ' + err.message);
  }
}
async function checkVR() {
  if (navigator.xr) {
    const ok = await navigator.xr.isSessionSupported('immersive-vr').catch(() => false);
    if (ok) document.getElementById('enter-vr-btn').style.display = 'inline-block';
  }
}

// ── Init ───────────────────────────────────
initScene();
initControllers();
initDesktopControls();
renderer.setAnimationLoop(render);
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
document.getElementById('start-btn').addEventListener('click', startDesktop);
document.getElementById('enter-vr-btn').addEventListener('click', startVR);
checkVR();
</script>
</body>
</html>
