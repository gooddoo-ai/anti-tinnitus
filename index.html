<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR Sound Therapy — Tinnitus Relief</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
    }
    canvas { display: block; }

    /* Overlay UI — fades out after interaction */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 15, 0.85);
      transition: opacity 0.6s ease;
    }
    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #overlay h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #fff;
    }
    #overlay p {
      font-size: 0.85rem;
      line-height: 1.6;
      color: #999;
      max-width: 420px;
      text-align: center;
      margin-bottom: 1.2rem;
    }
    .btn {
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      margin: 4px;
    }
    #start-btn {
      background: #4a6cf7;
      color: #fff;
    }
    #start-btn:hover { background: #3b5de7; }
    #enter-vr-btn {
      background: #2a2a3e;
      color: #aaa;
      display: none;
    }
    #enter-vr-btn:hover { background: #3a3a4e; }

    /* HUD — always visible bottom-left */
    #hud {
      position: fixed;
      bottom: 16px;
      left: 16px;
      z-index: 5;
      font-size: 0.8rem;
      color: rgba(150, 160, 255, 0.7);
      font-family: 'SF Mono', 'Fira Code', monospace;
      pointer-events: none;
      text-shadow: 0 0 8px rgba(74, 108, 247, 0.3);
    }
    #hud .label { color: rgba(150, 160, 255, 0.4); }
  </style>
</head>
<body>

<!-- Overlay: shown until user starts -->
<div id="overlay">
  <h1>VR Sound Therapy</h1>
  <p>Move the glowing sphere to explore sound.<br>
     Height = frequency (low ↔ high), Left-Right = stereo panning.<br>
     Designed for tinnitus relief.</p>
  <div>
    <button class="btn" id="start-btn">Start (Desktop)</button>
    <button class="btn" id="enter-vr-btn">Enter VR</button>
  </div>
</div>

<!-- HUD -->
<div id="hud"></div>

<!-- Three.js r170 via CDN -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ──────────────────────────────────────────────
// Configuration
// ──────────────────────────────────────────────
const CONFIG = {
  minFreq: 20,
  maxFreq: 20000,
  smoothingTime: 0.06,
  defaultGain: 0.35,

  minY: 0.0,
  maxY: 2.5,
  panRangeX: 2.0,

  grabDistance: 0.5,       // VR grab distance (meters)
  sphereRadius: 0.08,
  sphereColor: 0x4a6cf7,
  sphereEmissive: 0x4a6cf7,
  sphereEmissiveIntensity: 0.8,
};

// ──────────────────────────────────────────────
// State
// ──────────────────────────────────────────────
let renderer, scene, camera;
let sphere, sphereGlow, sphereLight;
let audioCtx, oscillator, panner, gainNode;
let audioStarted = false;
let desktopDragging = false;

const grabState = { controller: null, isGrabbed: false };
const overlayEl = document.getElementById('overlay');
const hudEl = document.getElementById('hud');
const startBtn = document.getElementById('start-btn');
const enterVrBtn = document.getElementById('enter-vr-btn');

// ──────────────────────────────────────────────
// Audio Engine
// ──────────────────────────────────────────────
function initAudio() {
  if (audioStarted) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  oscillator = audioCtx.createOscillator();
  oscillator.type = 'sine';
  oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);

  panner = audioCtx.createStereoPanner();
  panner.pan.setValueAtTime(0, audioCtx.currentTime);

  gainNode = audioCtx.createGain();
  gainNode.gain.setValueAtTime(0, audioCtx.currentTime); // Start silent, fade in

  oscillator.connect(panner);
  panner.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  oscillator.start();

  // Fade in over 300ms to avoid click
  gainNode.gain.linearRampToValueAtTime(CONFIG.defaultGain, audioCtx.currentTime + 0.3);
  audioStarted = true;
}

function resumeAudio() {
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

function mapYToFrequency(y) {
  const t = Math.max(0, Math.min(1, (y - CONFIG.minY) / (CONFIG.maxY - CONFIG.minY)));
  return CONFIG.minFreq * Math.pow(CONFIG.maxFreq / CONFIG.minFreq, t);
}

function mapXToPan(x) {
  return Math.max(-1, Math.min(1, x / CONFIG.panRangeX));
}

function updateAudio(position) {
  if (!audioCtx || !audioStarted) return;
  resumeAudio();

  const now = audioCtx.currentTime;
  const freq = mapYToFrequency(position.y);
  const pan = mapXToPan(position.x);

  oscillator.frequency.cancelScheduledValues(now);
  oscillator.frequency.setValueAtTime(oscillator.frequency.value, now);
  oscillator.frequency.linearRampToValueAtTime(freq, now + CONFIG.smoothingTime);

  panner.pan.cancelScheduledValues(now);
  panner.pan.setValueAtTime(panner.pan.value, now);
  panner.pan.linearRampToValueAtTime(pan, now + CONFIG.smoothingTime);
}

// ──────────────────────────────────────────────
// Three.js Scene
// ──────────────────────────────────────────────
function initScene() {
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  renderer.setClearColor(0x0a0a12);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  document.body.prepend(renderer.domElement);

  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0a0a12, 0.12);

  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 50);
  camera.position.set(0, 1.6, 2.5);
  camera.lookAt(0, 1.2, 0);

  // Lighting
  scene.add(new THREE.AmbientLight(0x222244, 0.6));
  const topLight = new THREE.PointLight(0x4466aa, 1.5, 15);
  topLight.position.set(0, 3, 0);
  scene.add(topLight);

  // Floor grid
  const grid = new THREE.GridHelper(12, 24, 0x1a1a2e, 0x1a1a2e);
  grid.material.opacity = 0.4;
  grid.material.transparent = true;
  scene.add(grid);

  // Y-axis guide pillars (frequency reference)
  for (let x = -1; x <= 1; x += 2) {
    const pillarGeom = new THREE.CylinderGeometry(0.003, 0.003, CONFIG.maxY, 8);
    const pillarMat = new THREE.MeshBasicMaterial({ color: 0x333355, transparent: true, opacity: 0.25 });
    const pillar = new THREE.Mesh(pillarGeom, pillarMat);
    pillar.position.set(x * 0.5, CONFIG.maxY / 2, -0.5);
    scene.add(pillar);
  }

  // Sphere (sound source)
  const sphereGeom = new THREE.SphereGeometry(CONFIG.sphereRadius, 32, 32);
  const sphereMat = new THREE.MeshStandardMaterial({
    color: CONFIG.sphereColor,
    emissive: CONFIG.sphereEmissive,
    emissiveIntensity: CONFIG.sphereEmissiveIntensity,
    metalness: 0.3,
    roughness: 0.2,
  });
  sphere = new THREE.Mesh(sphereGeom, sphereMat);
  sphere.position.set(0, 1.2, -0.5);
  scene.add(sphere);

  // Glow shell
  const glowGeom = new THREE.SphereGeometry(CONFIG.sphereRadius * 3, 32, 32);
  const glowMat = new THREE.MeshBasicMaterial({
    color: CONFIG.sphereColor,
    transparent: true,
    opacity: 0.06,
    side: THREE.BackSide,
  });
  sphereGlow = new THREE.Mesh(glowGeom, glowMat);
  sphere.add(sphereGlow);

  // Point light attached to sphere
  sphereLight = new THREE.PointLight(0x4a6cf7, 1.5, 3);
  sphere.add(sphereLight);
}

// ──────────────────────────────────────────────
// WebXR Controllers (VR mode)
// ──────────────────────────────────────────────
function initControllers() {
  for (let i = 0; i < 2; i++) {
    const controller = renderer.xr.getController(i);
    scene.add(controller);

    // Controller tip visual
    const tip = new THREE.Mesh(
      new THREE.SphereGeometry(0.02, 16, 16),
      new THREE.MeshBasicMaterial({ color: 0x8888aa, transparent: true, opacity: 0.5 })
    );
    controller.add(tip);

    // Grab via squeeze or select (trigger)
    controller.addEventListener('squeezestart', onGrab);
    controller.addEventListener('squeezeend', onRelease);
    controller.addEventListener('selectstart', onGrab);
    controller.addEventListener('selectend', onRelease);
  }
}

function onGrab(event) {
  if (grabState.isGrabbed) return;
  const controller = event.target;
  const cPos = new THREE.Vector3();
  controller.getWorldPosition(cPos);
  const sPos = new THREE.Vector3();
  sphere.getWorldPosition(sPos);

  if (cPos.distanceTo(sPos) < CONFIG.grabDistance) {
    grabState.isGrabbed = true;
    grabState.controller = controller;
    sphere.material.emissiveIntensity = 1.5;
    sphereGlow.material.opacity = 0.15;
    sphereLight.intensity = 3;
    initAudio();
  }
}

function onRelease(event) {
  if (grabState.isGrabbed && grabState.controller === event.target) {
    grabState.isGrabbed = false;
    grabState.controller = null;
    sphere.material.emissiveIntensity = CONFIG.sphereEmissiveIntensity;
    sphereGlow.material.opacity = 0.06;
    sphereLight.intensity = 1.5;
  }
}

// ──────────────────────────────────────────────
// Desktop mouse interaction
// ──────────────────────────────────────────────
function initDesktopControls() {
  // Pointer events on the whole document (overlay is gone by now)
  document.addEventListener('pointerdown', (e) => {
    if (e.target.tagName === 'BUTTON') return;
    desktopDragging = true;
    moveSphereFromMouse(e);
  });

  document.addEventListener('pointermove', (e) => {
    if (!desktopDragging) return;
    moveSphereFromMouse(e);
  });

  document.addEventListener('pointerup', () => {
    desktopDragging = false;
  });
}

function moveSphereFromMouse(e) {
  const x = ((e.clientX / window.innerWidth) * 2 - 1) * CONFIG.panRangeX;
  const y = (1 - e.clientY / window.innerHeight) * CONFIG.maxY;
  sphere.position.x = x;
  sphere.position.y = Math.max(CONFIG.minY, Math.min(CONFIG.maxY, y));
  // Keep z fixed for desktop
  sphere.position.z = -0.5;
}

// ──────────────────────────────────────────────
// Render Loop
// ──────────────────────────────────────────────
function render(time) {
  // VR: follow controller
  if (grabState.isGrabbed && grabState.controller) {
    const pos = new THREE.Vector3();
    grabState.controller.getWorldPosition(pos);
    sphere.position.copy(pos);
  }

  // Glow pulse
  const pulse = 0.05 + Math.sin(time * 0.002) * 0.02;
  if (!grabState.isGrabbed && !desktopDragging) {
    sphereGlow.material.opacity = pulse;
  }

  // Update audio continuously
  if (audioStarted) {
    updateAudio(sphere.position);
  }

  // HUD (desktop only)
  if (!renderer.xr.isPresenting) {
    const freq = mapYToFrequency(sphere.position.y);
    const pan = mapXToPan(sphere.position.x);
    hudEl.innerHTML =
      `<span class="label">freq</span> ${freq.toFixed(1)} Hz &nbsp; ` +
      `<span class="label">pan</span> ${pan.toFixed(2)} &nbsp; ` +
      `<span class="label">y</span> ${sphere.position.y.toFixed(2)}m`;
  }

  renderer.render(scene, camera);
}

// ──────────────────────────────────────────────
// Start / VR Entry
// ──────────────────────────────────────────────
function startDesktop() {
  overlayEl.classList.add('hidden');
  initAudio();
  // Highlight sphere briefly
  sphere.material.emissiveIntensity = 1.5;
  sphereLight.intensity = 3;
  setTimeout(() => {
    sphere.material.emissiveIntensity = CONFIG.sphereEmissiveIntensity;
    sphereLight.intensity = 1.5;
  }, 600);
}

async function startVR() {
  try {
    initAudio();
    const session = await navigator.xr.requestSession('immersive-vr', {
      optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking'],
    });
    renderer.xr.setSession(session);
    overlayEl.classList.add('hidden');
    session.addEventListener('end', () => {
      overlayEl.classList.remove('hidden');
    });
  } catch (err) {
    console.error('VR session failed:', err);
    alert('VR을 시작할 수 없습니다: ' + err.message);
  }
}

async function checkVR() {
  if (navigator.xr) {
    const ok = await navigator.xr.isSessionSupported('immersive-vr').catch(() => false);
    if (ok) {
      enterVrBtn.style.display = 'inline-block';
    }
  }
}

// ──────────────────────────────────────────────
// Init
// ──────────────────────────────────────────────
initScene();
initControllers();
initDesktopControls();
renderer.setAnimationLoop(render);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

startBtn.addEventListener('click', startDesktop);
enterVrBtn.addEventListener('click', startVR);
checkVR();
</script>
</body>
</html>
